      <stop offset="65%" stop-color="#5838a8" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#5838a8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g5" cx="50%" cy="48%" r="45%">
