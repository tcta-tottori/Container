<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1040"/>
      <stop offset="40%" stop-color="#3b4db8"/>
      <stop offset="100%" stop-color="#7c5cc8"/>
    </linearGradient>
    <filter id="neon" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur1"/>
        <feMergeNode in="blur2"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="neon-strong" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="12" result="blur1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur2"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur3"/>
      <feMerge>
        <feMergeNode in="blur1"/>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur3"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- 暗い背景 -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <!-- 内側のほんのりグロー -->
  <rect width="512" height="512" rx="100" fill="none" stroke="rgba(120,140,255,0.08)" stroke-width="40"/>

  <!-- キューブ本体（ネオングロー） -->
  <g transform="translate(270,235)" fill="none" stroke="#7adfff" stroke-width="10" stroke-linejoin="round" filter="url(#neon-strong)">
    <!-- 上面 -->
    <polygon points="0,-110 115,-55 0,0 -115,-55"/>
    <!-- 左面 -->
    <polygon points="-115,-55 0,0 0,120 -115,65"/>
    <!-- 右面 -->
    <polygon points="115,-55 0,0 0,120 115,65"/>
  </g>
  <!-- キューブ内部の縦線（立体感） -->
  <g transform="translate(270,235)" fill="none" stroke="#7adfff" stroke-width="10" stroke-linecap="round" filter="url(#neon)">
    <line x1="0" y1="0" x2="0" y2="120"/>
  </g>

  <!-- 矢印（左に出る、大きな三角矢じり） -->
  <g fill="none" stroke="#7adfff" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" filter="url(#neon-strong)">
    <!-- 矢印の棒 -->
    <line x1="155" y1="235" x2="100" y2="235"/>
    <!-- 三角矢じり（大きめ） -->
    <polygon points="105,235 135,210 135,260" fill="#7adfff" stroke="#7adfff" stroke-width="4"/>
  </g>

  <!-- 右下スパークル -->
  <g transform="translate(440,420)" fill="rgba(220,220,240,0.6)" filter="url(#neon)">
    <path d="M0,-12 L3,-3 L12,0 L3,3 L0,12 L-3,3 L-12,0 L-3,-3 Z"/>
  </g>
</svg>
