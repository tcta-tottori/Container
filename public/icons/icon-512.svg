<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b6ef6"/>
      <stop offset="20%" stop-color="#e87420"/>
      <stop offset="45%" stop-color="#7c48d0"/>
      <stop offset="65%" stop-color="#3b6ef6"/>
      <stop offset="85%" stop-color="#e87420"/>
      <stop offset="100%" stop-color="#7c48d0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feFlood flood-color="#8ab4ff" flood-opacity="0.8" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="g1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur2"/>
      <feFlood flood-color="#c0d8ff" flood-opacity="0.5" result="color2"/>
      <feComposite in="color2" in2="blur2" operator="in" result="g2"/>
      <feMerge>
        <feMergeNode in="g1"/>
        <feMergeNode in="g2"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <g transform="translate(256,256)" filter="url(#glow)">
    <polygon points="0,-130 150,-65 0,0 -150,-65" fill="none" stroke="#fff" stroke-width="22" stroke-linejoin="round"/>
    <polygon points="-150,-65 0,0 0,130 -150,65" fill="none" stroke="#fff" stroke-width="22" stroke-linejoin="round"/>
    <polygon points="150,-65 0,0 0,130 150,65" fill="none" stroke="#fff" stroke-width="22" stroke-linejoin="round"/>
  </g>
</svg>
