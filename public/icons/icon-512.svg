<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a4dcf"/>
      <stop offset="30%" stop-color="#5b3dbb"/>
      <stop offset="55%" stop-color="#7c3aaf"/>
      <stop offset="80%" stop-color="#c4591e"/>
      <stop offset="100%" stop-color="#e87420"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feFlood flood-color="#8ab4ff" flood-opacity="0.8" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="g1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur2"/>
      <feFlood flood-color="#c0d8ff" flood-opacity="0.5" result="color2"/>
      <feComposite in="color2" in2="blur2" operator="in" result="g2"/>
      <feMerge>
        <feMergeNode in="g1"/>
        <feMergeNode in="g2"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Cube: top-down view (rotateX more, showing top face wider) -->
  <g transform="translate(256,270)" filter="url(#glow)">
    <!-- Top face (大きく見せる: 上から見下ろし) -->
    <polygon points="0,-170 170,-85 0,0 -170,-85" fill="none" stroke="#fff" stroke-width="24" stroke-linejoin="round"/>
    <!-- Left face -->
    <polygon points="-170,-85 0,0 0,140 -170,55" fill="none" stroke="#fff" stroke-width="24" stroke-linejoin="round"/>
    <!-- Right face -->
    <polygon points="170,-85 0,0 0,140 170,55" fill="none" stroke="#fff" stroke-width="24" stroke-linejoin="round"/>
  </g>
</svg>
