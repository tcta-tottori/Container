<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <clipPath id="clip"><rect width="200" height="200" rx="44"/></clipPath>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a7af7"/>
      <stop offset="35%" stop-color="#6b52d4"/>
      <stop offset="65%" stop-color="#9b45c9"/>
      <stop offset="100%" stop-color="#c0549a"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="b"/>
      <feFlood flood-color="#fff" flood-opacity="0.3" result="c"/>
      <feComposite in="c" in2="b" operator="in" result="g"/>
      <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g clip-path="url(#clip)">
    <rect width="200" height="200" fill="url(#bg)"/>
  </g>
  <g transform="translate(100,100)" filter="url(#glow)" fill="none" stroke="#fff" stroke-width="11.8" stroke-linejoin="round">
    <polygon points="0,-65.3 56.3,-32.6 0,0 -56.3,-32.6"/>
    <polygon points="-56.3,-32.6 0,0 0,65.3 -56.3,32.6"/>
    <polygon points="56.3,-32.6 0,0 0,65.3 56.3,32.6"/>
  </g>
</svg>
