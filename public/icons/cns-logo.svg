<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <clipPath id="clip"><rect width="200" height="200" rx="42"/></clipPath>
    <radialGradient id="g1" cx="10%" cy="10%" r="60%">
      <stop offset="0%" stop-color="#4a88ff" stop-opacity="0.95"/>
      <stop offset="70%" stop-color="#3060d0" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#3060d0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="85%" cy="20%" r="50%">
      <stop offset="0%" stop-color="#a868f0" stop-opacity="0.85"/>
      <stop offset="60%" stop-color="#7848c8" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#7848c8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g3" cx="90%" cy="90%" r="55%">
      <stop offset="0%" stop-color="#ff9838" stop-opacity="0.9"/>
      <stop offset="55%" stop-color="#e07820" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#e07820" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g4" cx="20%" cy="85%" r="45%">
      <stop offset="0%" stop-color="#7848d0" stop-opacity="0.75"/>
      <stop offset="65%" stop-color="#5838a8" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#5838a8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g5" cx="50%" cy="48%" r="45%">
      <stop offset="0%" stop-color="#6858d8" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#4838a8" stop-opacity="0"/>
    </radialGradient>
    <filter id="neon" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="b1"/>
      <feFlood flood-color="#5090ff" flood-opacity="0.85" result="c1"/>
      <feComposite in="c1" in2="b1" operator="in" result="glow1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="b2"/>
      <feFlood flood-color="#88bbff" flood-opacity="0.75" result="c2"/>
      <feComposite in="c2" in2="b2" operator="in" result="glow2"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="b3"/>
      <feFlood flood-color="#c8e0ff" flood-opacity="0.65" result="c3"/>
      <feComposite in="c3" in2="b3" operator="in" result="glow3"/>
      <feMerge>
        <feMergeNode in="glow1"/>
        <feMergeNode in="glow2"/>
        <feMergeNode in="glow3"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <g clip-path="url(#clip)">
    <rect width="200" height="200" fill="#161028"/>
    <rect width="200" height="200" fill="url(#g1)"/>
    <rect width="200" height="200" fill="url(#g2)"/>
    <rect width="200" height="200" fill="url(#g3)"/>
    <rect width="200" height="200" fill="url(#g4)"/>
    <rect width="200" height="200" fill="url(#g5)"/>
  </g>
  <g transform="translate(100,102)" filter="url(#neon)">
    <polygon points="0,-51 59,-16 0,20 -59,-16" fill="none" stroke="#fff" stroke-width="11" stroke-linejoin="round"/>
    <polygon points="-59,-16 0,20 0,51 -59,16" fill="none" stroke="#fff" stroke-width="11" stroke-linejoin="round"/>
    <polygon points="59,-16 0,20 0,51 59,16" fill="none" stroke="#fff" stroke-width="11" stroke-linejoin="round"/>
  </g>
</svg>
